<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CustomDiscs — Загрузить пластинку</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #16213e; padding: 2rem; border-radius: 12px; width: 420px; box-shadow: 0 4px 24px #0008; }
  h2 { color: #e94560; margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: .4rem; color: #aaa; font-size: .9rem; }
  input[type=text], input[type=file] { width: 100%; padding: .6rem; border-radius: 6px; border: 1px solid #333; background: #0f3460; color: #eee; margin-bottom: 1rem; }
  button { width: 100%; padding: .75rem; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  button:disabled { background: #555; cursor: not-allowed; }
  .hint { font-size: .82rem; color: #888; margin-top: 1rem; line-height: 1.6; }
  .hint a { color: #4ade80; }
  .badge { background: #0f3460; border: 1px solid #4ade80; color: #4ade80; border-radius: 4px; padding: .1rem .5rem; font-size: .8rem; margin-left: .3rem; }
  #status { margin-top: 1rem; padding: .75rem; border-radius: 6px; display: none; text-align: center; }
  #status.ok  { background: #14532d; color: #4ade80; display: block; }
  #status.err { background: #450a0a; color: #f87171; display: block; }
  #status.loading { background: #1e3a5f; color: #93c5fd; display: block; }
  .progress { width: 100%; height: 6px; background: #0f3460; border-radius: 3px; margin-top: .5rem; display: none; }
  .progress-bar { height: 100%; background: #e94560; border-radius: 3px; transition: width .3s; width: 0%; }
</style>
</head>
<body>
<div class="card">
  <h2>🎵 Загрузить пластинку</h2>

  <label>Токен (из команды /disc upload)</label>
  <input type="text" id="token" placeholder="Вставь токен из игры">

  <label>Название пластинки</label>
  <input type="text" id="discName" maxlength="32" placeholder="Например: Lo-Fi Chill">

  <label>Аудиофайл <span class="badge">.ogg</span></label>
  <input type="file" id="audioFile" accept=".ogg">

  <button id="uploadBtn" onclick="upload()">Загрузить</button>
  <div class="progress" id="progressBar"><div class="progress-bar" id="progressFill"></div></div>
  <div id="status"></div>

  <p class="hint">
    Токен получи командой <strong>/disc upload</strong> в игре.<br>
    Для конвертации в .ogg: <a href="https://convertio.co/ru/mp3-ogg/" target="_blank">convertio.co/ru/mp3-ogg/</a>
  </p>
</div>

<script>
  // Конфиг — подставляется автоматически плагином
  const CONFIG = {
    repoOwner: "mau007c-svg",
    repoName:  "pack",
    branch:    "main"
  };

  async function upload() {
    const token    = document.getElementById("token").value.trim();
    const discName = document.getElementById("discName").value.trim();
    const fileInput = document.getElementById("audioFile");
    const btn      = document.getElementById("uploadBtn");

    if (!token)    return setStatus("err", "Укажи токен из игры.");
    if (!discName) return setStatus("err", "Укажи название пластинки.");
    if (!fileInput.files[0]) return setStatus("err", "Выбери .ogg файл.");
    if (!fileInput.files[0].name.toLowerCase().endsWith(".ogg"))
      return setStatus("err", "Только .ogg файлы! Конвертируй на convertio.co");

    btn.disabled = true;
    setStatus("loading", "Загружаю файл на сервер...");
    showProgress(30);

    try {
      const file = fileInput.files[0];
      const base64 = await toBase64(file);
      showProgress(60);

      // Безопасное имя файла
      const safeName = discName.replace(/[^a-zA-Z0-9_]/g, "_").toLowerCase();
      const fileName = "uploads/" + token + "_" + safeName + ".ogg";

      // Проверяем существует ли файл (нужен SHA для обновления)
      let sha = undefined;
      try {
        const check = await fetch(
          `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${fileName}`,
          { headers: { "Accept": "application/vnd.github.v3+json" } }
        );
        if (check.ok) {
          const data = await check.json();
          sha = data.sha;
        }
      } catch(e) {}

      showProgress(80);

      // Загружаем файл + метаданные в один JSON
      const meta = JSON.stringify({ discName, token });
      const metaB64 = btoa(unescape(encodeURIComponent(meta)));
      const metaFile = "uploads/" + token + "_" + safeName + ".json";

      // Сначала загружаем OGG
      const oggBody = { message: "Upload disc: " + discName, content: base64 };
      if (sha) oggBody.sha = sha;

      const oggRes = await fetch(
        `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${fileName}`,
        {
          method: "PUT",
          headers: { "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json" },
          body: JSON.stringify(oggBody)
        }
      );

      if (!oggRes.ok) {
        const err = await oggRes.json();
        throw new Error(err.message || "Ошибка загрузки файла");
      }

      showProgress(90);

      // Загружаем метаданные (название + токен)
      await fetch(
        `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${metaFile}`,
        {
          method: "PUT",
          headers: { "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json" },
          body: JSON.stringify({ message: "Meta: " + discName, content: metaB64 })
        }
      );

      showProgress(100);
      setStatus("ok", "✔ Готово! Файл загружен. Закрой эту страницу и зайди в игру — пластинка скоро появится в инвентаре.");

    } catch(e) {
      setStatus("err", "Ошибка: " + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function setStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = type;
    el.textContent = msg;
  }

  function showProgress(pct) {
    document.getElementById("progressBar").style.display = "block";
    document.getElementById("progressFill").style.width = pct + "%";
  }
</script>
</body>
</html>
